version: 2

models:
  - name: stg_moj_sales
    description: "Staged MOJ sales with English labels and price per m²"
    columns:
      - name: region_en
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: area
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: classification_en
        tests:
          - not_null
          - accepted_values:
              values: ['Residential', 'Commercial', 'Agricultural', 'Industrial', 'Other']
